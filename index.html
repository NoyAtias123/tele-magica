<!DOCTYPE html>
<html lang="es">
    <head>
        <!--A title to the page-->
        <title>Tele Mágica - Telenovelas argentinas para ver online</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!--Main title on the screen-->
        <h1 class="main-title">Tu próximo atracón empieza aquí</h1>
        <!--Create a side menu bar-->
        <div id="mySidenav" class="sidenav">
            <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
            <a href="index.html">Vuelvo a casa</a>
            <a href="about.html">About tele mágica</a>
            <a href="auth.html?mode=login">Login</a>
            <a href="auth.html?mode=signup">Signup</a>
            <a href="profile.html">Profile</a>
            <a href="catalog.html?type=serie">Serie</a>
            <a href="catalog.html?type=movie">Peliculas</a>
            <a href="catalog.html?type=show">Espectáculos</a>
        </div>
        <span class="menu-bar" onclick="openNav()">&#9776;</span>
        <!--Create a search bar-->
        <div class="search-wrapper">
            <input id="search_input" class="search-input" type="text" oninput="handleSearch(event)" placeholder="buscar una telenovela...">
            <span class="search-icon"></span>
            <div id="search_results" class="search-results-dropdown"></div>
        </div>
        <script src="main.js"></script>
    </body>
</html>
